name: Publish static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          rm -rf _deploy
          mkdir -p _deploy/outputs
          cp *.html _deploy/
          cp *.css _deploy/
          cp script.js _deploy/
          cp ethan-profile.jpeg _deploy/
          cp Ethan_Shaw_Resume.docx _deploy/
          cp outputs/dashboard.html _deploy/outputs/
          touch _deploy/.nojekyll

      - name: Publish to gh-pages
        run: |
          cd _deploy
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish static site"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
